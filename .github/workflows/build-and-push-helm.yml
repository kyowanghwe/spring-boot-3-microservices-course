# ============================================================
# HELM VERSION — GitHub Actions CI/CD
# ============================================================
# This is the Helm-based alternative to build-and-push.yml
# Instead of sed-ing the full image line in raw manifests,
# it ONLY updates the 'version:' field in the values file.
# ============================================================

name: Build and Push Microservices (Helm)

# DISABLED — uncomment the 'on: push' block below and comment out 'on: workflow_dispatch' to enable.
# To switch to Helm:
#   1. Uncomment the push trigger below
#   2. Comment out the workflow_dispatch line
#   3. In build-and-push.yml, comment out its push trigger and add workflow_dispatch

# on:
#   push:
#     branches: [master]
#     paths:
#       - 'product-service/**'
#       - 'order-service/**'
#       - 'inventory-service/**'
#       - 'notification-service/**'
#       - 'api-gateway/**'
#       - 'frontend/**'
#       - 'pom.xml'
#       - '.github/workflows/**'

on:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      product: ${{ steps.changes.outputs.product }}
      order: ${{ steps.changes.outputs.order }}
      inventory: ${{ steps.changes.outputs.inventory }}
      notification: ${{ steps.changes.outputs.notification }}
      gateway: ${{ steps.changes.outputs.gateway }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            product:
              - 'product-service/**'
              - 'pom.xml'
            order:
              - 'order-service/**'
              - 'pom.xml'
            inventory:
              - 'inventory-service/**'
              - 'pom.xml'
            notification:
              - 'notification-service/**'
              - 'pom.xml'
            gateway:
              - 'api-gateway/**'
              - 'pom.xml'
            frontend:
              - 'frontend/**'

  build-service:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: product-service
            changed: ${{ needs.detect-changes.outputs.product }}
          - service: order-service
            changed: ${{ needs.detect-changes.outputs.order }}
          - service: inventory-service
            changed: ${{ needs.detect-changes.outputs.inventory }}
          - service: notification-service
            changed: ${{ needs.detect-changes.outputs.notification }}
          - service: api-gateway
            changed: ${{ needs.detect-changes.outputs.gateway }}
    if: needs.detect-changes.outputs.product == 'true' || needs.detect-changes.outputs.order == 'true' || needs.detect-changes.outputs.inventory == 'true' || needs.detect-changes.outputs.notification == 'true' || needs.detect-changes.outputs.gateway == 'true'
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Set up JDK 21
        if: matrix.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build image with Spring Boot
        if: matrix.changed == 'true'
        run: |
          mvn spring-boot:build-image -pl ${{ matrix.service }} -DskipTests \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKER_USERNAME }}/new-${{ matrix.service }}:${{ github.sha }}

      - name: Login to Docker Hub
        if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        if: matrix.changed == 'true'
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/new-${{ matrix.service }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/new-${{ matrix.service }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/new-${{ matrix.service }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/new-${{ matrix.service }}:latest

  build-frontend:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        run: |
          cd frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

  # ─────────────────────────────────────────────────────────────────
  # KEY DIFFERENCE: Instead of sed-ing the full image line in a raw
  # manifest, we ONLY update the 'version:' line in the values file.
  # Helm + ArgoCD does the rest at deploy time.
  # ─────────────────────────────────────────────────────────────────
  update-helm-values:
    needs: [detect-changes, build-service, build-frontend]
    if: always() && (needs.build-service.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy
          fetch-depth: 0

      - name: Update service values files (version only)
        if: needs.build-service.result == 'success'
        run: |
          services=("product-service" "order-service" "inventory-service" "notification-service" "api-gateway")
          changed=("${{ needs.detect-changes.outputs.product }}" "${{ needs.detect-changes.outputs.order }}" "${{ needs.detect-changes.outputs.inventory }}" "${{ needs.detect-changes.outputs.notification }}" "${{ needs.detect-changes.outputs.gateway }}")
          for i in "${!services[@]}"; do
            if [ "${changed[$i]}" == "true" ]; then
              # Only update the version line — everything else stays untouched
              sed -i "s|^version:.*|version: ${{ github.sha }}  # ← CI overwrites this|" k8s/helm/values/${services[$i]}-values.yaml
            fi
          done

      - name: Update frontend values file (version only)
        if: needs.build-frontend.result == 'success'
        run: |
          sed -i "s|^version:.*|version: ${{ github.sha }}  # ← CI overwrites this|" k8s/helm/values/frontend-values.yaml

      - name: Commit and push to deploy branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/helm/values/
          git commit -m "deploy(helm): update version to ${{ github.sha }}" || exit 0
          git push origin deploy
