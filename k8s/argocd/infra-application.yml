apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kyowanghwe/spring-boot-3-microservices-course.git
    targetRevision: deploy
    path: k8s/manifests/infra
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

