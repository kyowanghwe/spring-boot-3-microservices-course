# ============================================================
# HELM VERSION — Single ArgoCD Application (Umbrella Chart)
# ============================================================
# Deploys ALL microservices via a single umbrella Helm chart.
# This gives the same grouped resource tree view as microservices-infra.
#
# To use:
#   kubectl apply -f k8s/helm/argocd/apps-application-helm.yml
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kyowanghwe/spring-boot-3-microservices-course.git
    targetRevision: deploy
    path: k8s/helm/microservices-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# ============================================================
# INFRA — Still uses raw manifests
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kyowanghwe/spring-boot-3-microservices-course.git
    targetRevision: deploy
    path: k8s/manifests/infra
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
