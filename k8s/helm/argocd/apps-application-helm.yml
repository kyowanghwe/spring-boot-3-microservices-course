# ============================================================
# HELM VERSION — ArgoCD App of Apps (Applications)
# ============================================================
# Uses the App of Apps pattern to group all microservice helm apps
# under a single parent "microservices-apps" Application, matching
# the same grouping as the raw manifest approach.
#
# Parent app deploys child Application manifests from:
#   k8s/helm/argocd/apps/
#
# Requires: ArgoCD v2.3+
# Install/upgrade ArgoCD (must use --server-side to avoid annotation size limit error):
#   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --server-side
#
# To use:
#   kubectl apply -f k8s/helm/argocd/apps-application-helm.yml
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kyowanghwe/spring-boot-3-microservices-course.git
    targetRevision: deploy
    path: k8s/helm/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# ============================================================
# INFRA — Still uses raw manifests (no Helm needed for infra)
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kyowanghwe/spring-boot-3-microservices-course.git
    targetRevision: deploy
    path: k8s/manifests/infra
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
