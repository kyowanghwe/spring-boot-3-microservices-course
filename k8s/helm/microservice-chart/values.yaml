# Default values for microservice chart
# These are overridden by per-service values files

name: my-service
version: latest

image:
  repository: kyowanghwe99/my-service
  pullPolicy: IfNotPresent

replicas: 1

port: 8080

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "768Mi"
    cpu: "500m"

# Environment variables from ConfigMaps
# Format: { name: ENV_NAME, configMapName: cm-name, configMapKey: key }
envFromConfigMap: []

# Service-specific ConfigMap data (creates a ConfigMap named <name>-config)
configMapData: {}

# Whether to use the common-config ConfigMap (for shared env vars)
useCommonConfig: true

# Common config keys to inject (from common-config ConfigMap)
commonConfigKeys: []
