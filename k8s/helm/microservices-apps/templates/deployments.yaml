{{- range $name, $svc := .Values.services }}
{{- if and $svc.replicas (gt (int $svc.replicas) 0) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
    {{- include "microservices-apps.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ $svc.version }}"
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          {{- if $svc.port }}
          ports:
            - containerPort: {{ $svc.port }}
          {{- end }}
          {{- if $svc.resources }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- end }}
          {{- if or $svc.commonConfigKeys $svc.envFromConfigMap }}
          env:
            {{- range $svc.commonConfigKeys }}
            - name: {{ .name }}
              valueFrom:
                configMapKeyRef:
                  name: common-config
                  key: {{ .key }}
            {{- end }}
            {{- range $svc.envFromConfigMap }}
            - name: {{ .name }}
              valueFrom:
                configMapKeyRef:
                  name: {{ .configMapName }}
                  key: {{ .configMapKey }}
            {{- end }}
          {{- end }}
{{- end }}
{{- end }}
