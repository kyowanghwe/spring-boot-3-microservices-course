# Because you have annotated your test class with @AutoConfigureWireMock(port = 0),
# Spring Boot starts an in-memory WireMock server on a random available port.
# Once that server starts, Spring automatically adds the property wiremock.server.port to the application's Environment
inventory.service.url=http://localhost:${wiremock.server.port}

# Kafka Properties
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.template.default-topic=order-placed
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
# For testing, you might need a mock registry if 8085 isn't running:
spring.kafka.producer.properties.schema.registry.url=http://127.0.0.1:8085

# Loki URL - Required to prevent the Logback crash
loki.url=http://localhost:3100/loki/api/v1/push